name: Deploy to AWS ECR & App Runner

on:
  push:
    branches:
      - main
      - master

env:
  AWS_REGION: ap-northeast-1
  ECR_REGISTRY: 333347414948.dkr.ecr.ap-northeast-1.amazonaws.com
  ECR_REPOSITORY: nabysuro

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest .
          docker tag ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Deploy to AWS App Runner
        run: |
          aws apprunner start-deployment \
            --service-arn arn:aws:apprunner:${{ env.AWS_REGION }}:333347414948:service/nabysuro/$(aws apprunner list-services --region ${{ env.AWS_REGION }} --query "ServiceSummaryList[0].ServiceArn" --output text | cut -d'/' -f3) \
            --region ${{ env.AWS_REGION }} || echo "App Runner 서비스 ARN을 수동으로 확인하고 설정하세요"
